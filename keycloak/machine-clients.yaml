clients:

  # Test clients (automated testruns, ephemeral)
  # Naming convention sdep-test-ca*, sdep-test-str*, for automatic cleanup

  # -- Short-term rental platforms (STR)
  - id: "sdep-test-str01"
    secret: "sdep-test-str01"
    name: "Test STR 01 (test automation, ephemeral)"
    description: "STR client with read-write access"
    service_account_roles:
      - sdep_str
      - sdep_read
      - sdep_write

  # -- Competent authorities (CA)
  - id: "sdep-test-ca01"
    secret: "sdep-test-ca01"
    name: "Test CA 01 (test automation, ephemeral)"
    description: "CA client with read-write access"
    service_account_roles:
      - sdep_ca
      - sdep_read
      - sdep_write

  # Test clients (interactive usage)
  # Naming convention sdep-ca*, sdep-str* (avoid "sdep-test" to refrain from automatic cleanup)

  # -- Short-term rental platforms (STR)
  - id: "sdep-str01"
    secret: "sdep-str01"
    name: "Test STR 01 (interactive usage, persistent)"
    description: "STR client with read-write access"
    service_account_roles:
      - sdep_str
      - sdep_read
      - sdep_write

  # -- Competent authorities (CA)
  - id: "sdep-ca01"
    secret: "sdep-ca01"
    name: "Test CA 01 (interactive usage, persistent)"
    description: "CA client with read-write access"
    service_account_roles:
      - sdep_ca
      - sdep_read
      - sdep_write

  #  Test clients (interactive usage, deployed with predefined testdata)
  #  Naming convention sdep-ca*, sdep-str* (avoid "sdep-test" to refrain from automatic cleanup)

  # -- Competent authorities (CA)
